<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shabria Laundry — Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #EFF6FF 0%, #F0F7FF 50%, #E8F5E9 100%);
      padding: 20px;
    }
    .login-card {
      display: flex;
      width: 100%;
      max-width: 960px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(21,101,192,0.12);
      overflow: hidden;
      min-height: 560px;
    }
    .login-left {
      flex: 0 0 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: linear-gradient(155deg, #1565C0 0%, #0288D1 100%);
    }
    .login-left .logo {
      width: 100px; height: 100px;
      background: white;
      border-radius: 24px;
      padding: 10px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      object-fit: contain;
    }
    .login-left h1 {
      color: white;
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-left p {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .role-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 12px 16px;
      color: white;
      margin-bottom: 10px;
    }
    .role-badge .icon { font-size: 20px; }
    .role-badge strong { font-size: 13px; font-weight: 700; display: block; }
    .role-badge small  { font-size: 11px; color: rgba(255,255,255,0.7); }

    .login-right {
      flex: 1;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .login-right .greeting { font-size: 13px; color: #9CA3AF; margin-bottom: 6px; }
    .login-right h2 { font-size: 24px; font-weight: 900; color: #111827; margin-bottom: 32px; }

    .form-row { margin-bottom: 18px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: #F9FAFB;
      border-radius: 12px;
      border: 1.5px solid #E5E7EB;
      height: 50px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: #1565C0; background: white; }
    .input-wrap .ico { font-size: 17px; flex-shrink: 0; }
    .input-wrap input {
      flex: 1;
      background: transparent;
      font-size: 14px;
      color: #111827;
      border: none;
      outline: none;
    }
    .toggle-pw {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    #errMsg {
      font-size: 12px;
      color: #EF4444;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }

    .btn-login {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, #1565C0, #0288D1);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(21,101,192,0.3);
      margin-bottom: 28px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { background: #90CAF9; cursor: not-allowed; opacity: 1; }

    .demo-box {
      background: #F8FAFF;
      border-radius: 14px;
      border: 1px solid #DBEAFE;
      padding: 14px 16px;
    }
    .demo-box p { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 10px; }
    .demo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 12px;
      border-radius: 10px;
      background: white;
      border: 1px solid #E5E7EB;
      cursor: pointer;
      margin-bottom: 6px;
      font-size: 13px;
      color: #374151;
      font-weight: 600;
      transition: background 0.15s;
    }
    .demo-item:last-child { margin-bottom: 0; }
    .demo-item:hover { background: #F9FAFB; }
    .demo-item span { font-size: 11px; color: #9CA3AF; font-weight: 400; }

    /* Responsive */
    @media (max-width: 768px) {
      .login-left { display: none; }
      .login-right { padding: 32px 24px; }
    }
    @media (max-width: 480px) {
      .login-wrapper { padding: 0; align-items: stretch; }
      .login-card { border-radius: 0; min-height: 100vh; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Panel Kiri -->
      <div class="login-left">
        <img class="logo" src="assets/Logo.jpeg" alt="Shabria Laundry"
             onerror="this.style.display='none'" />
        <h1>Shabria Laundry</h1>
        <p>Sistem Manajemen Internal<br>untuk Kasir &amp; Manager</p>
        <div class="role-badge">
          <span class="icon">🛡️</span>
          <div><strong>Admin / Kasir</strong><small>Kelola transaksi &amp; laporan</small></div>
        </div>
        <div class="role-badge">
          <span class="icon">👑</span>
          <div><strong>Manager / Owner</strong><small>Monitor &amp; analisis bisnis</small></div>
        </div>
      </div>

      <!-- Panel Kanan (Form) -->
      <div class="login-right">
        <p class="greeting">Selamat datang kembali 👋</p>
        <h2>Masuk ke Akun Anda</h2>

        <form id="loginForm">
          <div class="form-row">
            <label>Email</label>
            <div class="input-wrap">
              <span class="ico">✉️</span>
              <input type="email" id="email" placeholder="Email akun Anda" required />
            </div>
          </div>

          <div class="form-row">
            <label>Password</label>
            <div class="input-wrap">
              <span class="ico">🔒</span>
              <input type="password" id="password" placeholder="Password Anda" required />
              <button type="button" class="toggle-pw" id="togglePw" title="Tampilkan password">👁️</button>
            </div>
          </div>

          <p id="errMsg"></p>

          <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
        </form>

        <!-- Demo accounts -->
        <div class="demo-box">
          <p>🔑 Akun Demo — klik untuk isi otomatis:</p>
          <button class="demo-item" onclick="fillDemo('siti@shabria.com','admin123')">
            Siti Aminah (Kasir) <span>siti@shabria.com</span>
          </button>
          <button class="demo-item" onclick="fillDemo('budi@shabria.com','admin123')">
            Budi Kurniawan (Kasir) <span>budi@shabria.com</span>
          </button>
          <button class="demo-item" onclick="fillDemo('manager@shabria.com','manager123')">
            Hendra Kusuma (Manager) <span>manager@shabria.com</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Ganti BASE_URL jika Flask berjalan di port/server lain ── */
    const BASE_URL = 'http://localhost:5000/api';

    /* Cek apakah sudah login */
    (async () => {
      try {
        const res = await fetch(BASE_URL + '/auth/me', { credentials: 'include' });
        if (res.ok) {
          const u = await res.json();
          redirect(u.role);
        }
      } catch {}
    })();

    function redirect(role) {
      window.location.href = role === 'manager'
        ? 'manager/dashboard.html'
        : 'admin/dashboard.html';
    }

    function fillDemo(email, pw) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = pw;
    }

    document.getElementById('togglePw').onclick = () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errMsg');
      const email  = document.getElementById('email').value.trim();
      const pw     = document.getElementById('password').value;

      btn.textContent = 'Masuk...';
      btn.disabled    = true;
      errMsg.style.display = 'none';

      try {
        const res  = await fetch(BASE_URL + '/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login gagal');

        /* Simpan user ke sessionStorage untuk dipakai halaman lain */
        sessionStorage.setItem('currentUser', JSON.stringify(data));
        redirect(data.role);
      } catch (err) {
        errMsg.textContent   = err.message;
        errMsg.style.display = 'block';
        btn.textContent = 'Masuk';
        btn.disabled    = false;
      }
    };
  </script>
</body>
</html>
