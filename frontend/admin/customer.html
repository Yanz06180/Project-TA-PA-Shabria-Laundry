<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer — Admin Shabria Laundry</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .page-inner { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
    .customer-card {
      background: white;
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow 0.15s;
    }
    .customer-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .avatar {
      width: 48px; height: 48px; border-radius: 14px;
      background: #EFF6FF; display: flex; align-items: center;
      justify-content: center; font-size: 18px; font-weight: 800;
      color: #1565C0; flex-shrink: 0;
    }
    .grid-customers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }
    @media (max-width: 600px) {
      .grid-customers { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app" style="display:flex; height:100vh; overflow:hidden; background:#F0F7FF;">
    <div id="sidebar" class="desktop-sidebar" style="flex-shrink:0;"></div>
    <div id="overlay" onclick="closeSidebar()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:198;"></div>
    <div id="mobileSidebar" style="display:none; position:fixed; top:0; left:0; bottom:0; width:260px; z-index:199;"></div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;">
      <header id="topHeader"></header>

      <main style="flex:1; overflow-y:auto; scrollbar-width:none;">
        <div class="page-inner">
          <!-- Page title + add button -->
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
            <div>
              <h1 style="font-size:22px; font-weight:900; color:#111827;">Data Customer</h1>
              <p style="font-size:13px; color:#9CA3AF; margin-top:4px;" id="customerCount">Memuat...</p>
            </div>
            <button onclick="openModal()" class="btn btn-primary">＋ Tambah Customer</button>
          </div>

          <!-- Search -->
          <div class="search-bar" style="margin-bottom:20px; max-width:480px;">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Cari nama atau nomor telepon..."
              oninput="filterCustomers()" />
          </div>

          <!-- List -->
          <div class="grid-customers" id="customerGrid">
            <p style="color:#9CA3AF; grid-column:1/-1; text-align:center; padding:40px 0;">Memuat data...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal Tambah/Edit Customer -->
  <div class="modal-overlay" id="modal">
    <div class="modal" style="max-width:460px;">
      <div class="modal-header">
        <h3 id="modalTitle">Tambah Customer</h3>
        <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; font-size:22px; line-height:1; color:#9CA3AF;">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label class="form-label">Nama Depan <span style="color:#EF4444;">*</span></label>
          <input class="form-control" id="fFirstName" placeholder="Nama depan" />
        </div>
        <div class="form-group">
          <label class="form-label">Nama Belakang</label>
          <input class="form-control" id="fLastName" placeholder="Nama belakang (opsional)" />
        </div>
        <div class="form-group">
          <label class="form-label">No. Telepon <span style="color:#EF4444;">*</span></label>
          <input class="form-control" id="fTelepon" placeholder="08xxxxxxxxxx" type="tel" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Alamat</label>
          <textarea class="form-control" id="fAlamat" placeholder="Alamat lengkap (opsional)" rows="2"
            style="resize:none;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="saveCustomer()" class="btn btn-primary" id="saveBtn">Simpan</button>
        <button onclick="closeModal()"   class="btn btn-ghost">Batal</button>
      </div>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:360px;">
      <div class="modal-body" style="text-align:center; padding:32px 28px;">
        <span style="font-size:48px; display:block; margin-bottom:16px;">🗑️</span>
        <h3 style="font-size:17px; font-weight:800; color:#111827; margin-bottom:8px;">Hapus Customer?</h3>
        <p id="deleteNameLabel" style="font-size:14px; color:#6B7280; margin-bottom:24px;"></p>
        <div style="display:flex; gap:10px;">
          <button onclick="confirmDelete()" class="btn btn-danger" style="flex:1;">Hapus</button>
          <button onclick="document.getElementById('deleteModal').classList.remove('show')" class="btn btn-ghost" style="flex:1;">Batal</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    let allCustomers = [];
    let deleteTargetId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await requireAuth(['admin']);
      initAdminLayout(user, 'customers');
      await loadCustomers();
    });

    async function loadCustomers() {
      try {
        allCustomers = await api.pelanggan.all();
        document.getElementById('customerCount').textContent =
          `${allCustomers.length} pelanggan terdaftar`;
        renderCustomers(allCustomers);
      } catch (err) {
        showToast('Gagal memuat customer: ' + err.message, 'error');
      }
    }

    function filterCustomers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allCustomers.filter(c =>
        (c.pel_first_name + ' ' + c.pel_last_name).toLowerCase().includes(q) ||
        c.pel_no_telepon.includes(q)
      );
      renderCustomers(filtered);
    }

    function renderCustomers(list) {
      const grid = document.getElementById('customerGrid');
      if (list.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 0;">
          <span style="font-size:48px;">👥</span>
          <p style="color:#9CA3AF; margin-top:12px; font-size:14px;">Tidak ada customer ditemukan</p>
        </div>`;
        return;
      }
      grid.innerHTML = list.map(c => {
        const nama     = `${c.pel_first_name} ${c.pel_last_name}`.trim();
        const initials = nama.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
        return `
          <div class="customer-card">
            <div class="avatar">${initials}</div>
            <div style="flex:1; min-width:0;">
              <p style="font-size:15px; font-weight:700; color:#111827;">${nama}</p>
              <p style="font-size:12px; color:#6B7280; margin-top:2px;">📱 ${c.pel_no_telepon}</p>
              ${c.pel_alamat ? `<p style="font-size:11px; color:#9CA3AF; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">📍 ${c.pel_alamat}</p>` : ''}
            </div>
            <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
              <button onclick="openEdit(${c.id_pelanggan})"
                style="width:34px; height:34px; border-radius:10px; background:#EFF6FF; border:none; cursor:pointer; font-size:15px;">✏️</button>
              <button onclick="openDelete(${c.id_pelanggan}, '${nama}')"
                style="width:34px; height:34px; border-radius:10px; background:#FEF2F2; border:none; cursor:pointer; font-size:15px;">🗑️</button>
            </div>
          </div>`;
      }).join('');
    }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'Tambah Customer';
      document.getElementById('editId').value    = '';
      document.getElementById('fFirstName').value = '';
      document.getElementById('fLastName').value  = '';
      document.getElementById('fTelepon').value   = '';
      document.getElementById('fAlamat').value    = '';
      document.getElementById('saveBtn').textContent = 'Tambah Customer';
      document.getElementById('modal').classList.add('show');
    }

    function openEdit(id) {
      const c = allCustomers.find(x => x.id_pelanggan === id);
      if (!c) return;
      document.getElementById('modalTitle').textContent  = 'Edit Customer';
      document.getElementById('editId').value            = id;
      document.getElementById('fFirstName').value        = c.pel_first_name;
      document.getElementById('fLastName').value         = c.pel_last_name || '';
      document.getElementById('fTelepon').value          = c.pel_no_telepon;
      document.getElementById('fAlamat').value           = c.pel_alamat || '';
      document.getElementById('saveBtn').textContent     = 'Simpan Perubahan';
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    async function saveCustomer() {
      const id        = document.getElementById('editId').value;
      const firstName = document.getElementById('fFirstName').value.trim();
      const lastName  = document.getElementById('fLastName').value.trim();
      const telepon   = document.getElementById('fTelepon').value.trim();
      const alamat    = document.getElementById('fAlamat').value.trim();

      if (!firstName || !telepon) {
        showToast('Nama depan dan telepon wajib diisi', 'error'); return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Menyimpan...';

      try {
        const data = {
          pel_first_name: firstName,
          pel_last_name:  lastName,
          pel_no_telepon: telepon,
          pel_alamat:     alamat,
        };
        if (id) {
          await api.pelanggan.update(Number(id), data);
          showToast('Customer berhasil diupdate', 'success');
        } else {
          await api.pelanggan.create(data);
          showToast('Customer berhasil ditambahkan', 'success');
        }
        closeModal();
        await loadCustomers();
      } catch (err) {
        showToast('Gagal: ' + err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = id ? 'Simpan Perubahan' : 'Tambah Customer';
      }
    }

    function openDelete(id, nama) {
      deleteTargetId = id;
      document.getElementById('deleteNameLabel').textContent =
        `Yakin hapus "${nama}" dari database?`;
      document.getElementById('deleteModal').classList.add('show');
    }

    async function confirmDelete() {
      if (!deleteTargetId) return;
        try {
          await api.pelanggan.delete(deleteTargetId);
          showToast('Customer berhasil dihapus', 'success');
          document.getElementById('deleteModal').classList.remove('show');
          await loadCustomers();
        } catch (err) {
          const errMsg = err.message.toLowerCase();
          if (errMsg.includes('500') || errMsg.includes('foreign') || errMsg.includes('transaksi')) {
              showToast('Tidak bisa dihapus karena sudah memiliki riwayat transaksi.', 'error');
          } else {
              showToast('Tidak dapat dihapus: ' + err.message, 'error');
          }
        }
  }
  </script>
</body>
</html>
